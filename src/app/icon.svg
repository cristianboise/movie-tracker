    <line x1="18" y1="7" x2="15" y2="16" stroke="#111111" stroke-width="2.5" stroke-linecap="square"/>
    <line x1="25" y1="7" x2="22" y2="16" stroke="#111111" stroke-width="2.5" stroke-linecap="square"/>
  </g>
</svg>
